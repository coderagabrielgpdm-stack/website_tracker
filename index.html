<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }

        .card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .hidden {
            display: none !important;
        }

        /* DEFAULT DESKTOP LAYOUT (Moved from inline to here) */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }

        .manga-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 0.5fr auto;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .status-pill {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 99px;
            font-weight: bold;
        }

        .view-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: var(--text);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .user-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .pass-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .pass-wrapper input {
            padding-right: 40px;
            margin: 0;
        }

        .toggle-btn {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .toggle-btn:hover {
            color: var(--primary);
        }

        .stat-box {
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: 0.2s;
            border: 2px solid transparent;
            flex: 1;
        }

        .stat-box:hover {
            background: var(--bg);
        }

        .stat-box.active {
            border-color: var(--primary);
            background: var(--bg);
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 900px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
                /* Switch to 1 column */
            }

            nav {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            #nav-links {
                width: 100%;
                justify-content: center;
            }

            .manga-row {
                grid-template-columns: 1fr 1fr;
                /* Card-like 2 columns on mobile */
                gap: 10px;
            }

            /* Make Title and Progress Bar take up the full width of the row */
            .manga-row div:first-child {
                grid-column: span 2;
                border-bottom: 1px solid var(--border);
                padding-bottom: 5px;
                margin-bottom: 5px;
            }

            #manga-list-header {
                display: none !important;
            }

            .stat-box {
                min-width: 100px;
            }
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <div class="container">
        <div id="live-clock" style="font-size: 0.8rem; font-weight: 600; opacity: 0.7; margin-bottom: -15px;"></div>

        <nav>
            <div class="logo" onclick="location.reload()">☁️ Manga Tracker</div>
            <div id="nav-links" style="display: flex; align-items: center; gap: 10px;">
                <button class="btn-outline btn-sm" onclick="toggleTheme()" id="theme-btn">🌙</button>
                <div id="nav-logged-out">
                    <button class="btn-outline" onclick="showView('login')">Login</button>
                    <button class="btn-primary" onclick="showView('signup')" style="width: auto;">Sign Up</button>
                </div>
                <div id="nav-logged-in" class="hidden">
                    <span id="user-display" style="margin-right:10px; font-weight:600"></span>
                    <button class="btn-outline btn-sm" onclick="handleLogout()">Logout</button>
                </div>
            </div>
        </nav>

        <div id="view-login" class="card" style="max-width: 400px; margin: 0 auto;">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <div class="pass-wrapper" style="margin: 8px 0;">
                <input type="password" id="login-password" placeholder="Password">
                <button type="button" class="toggle-btn" onclick="togglePassword('login-password', this)">👁️</button>
            </div>
            <button class="btn-primary" onclick="handleLogin()">Login</button>
        </div>

        <div id="view-signup" class="card hidden" style="max-width: 400px; margin: 0 auto;">
            <h2>Create Account</h2>
            <input type="email" id="signup-email" placeholder="Email">
            <div class="pass-wrapper" style="margin: 8px 0;">
                <input type="password" id="signup-password" placeholder="Password">
                <button type="button" class="toggle-btn" onclick="togglePassword('signup-password', this)">👁️</button>
            </div>
            <button class="btn-primary" onclick="handleSignup()">Sign Up</button>
        </div>

        <div id="view-dashboard" class="hidden">
            <div class="view-tabs">
                <div id="tab-my" class="tab-btn active" onclick="switchTab('my')">My Manga List</div>
                <div id="tab-community" class="tab-btn" onclick="switchTab('community')">Community</div>
            </div>

            <div id="stats-container" class="card"
                style="display: flex; justify-content: space-around; flex-wrap: wrap; text-align: center; gap: 10px; margin-bottom: 20px;">
            </div>

            <div class="dashboard-layout">
                <div id="tracker-form-card" class="card">
                    <h3 id="form-title">Add New Manga</h3>
                    <input type="text" id="m-title" placeholder="Manga Title">
                    <input type="url" id="m-image" placeholder="Cover Image URL (Optional)">
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="m-chapter" step="0.1" placeholder="Chapter">
                        <input type="number" id="m-total" placeholder="Total Ch.">
                    </div>
                    <select id="m-rating">
                        <option value="0">Rating: None</option>
                        <option value="10">⭐ 10 Masterpiece</option>
                        <option value="9">⭐ 9 Great</option>
                        <option value="8">⭐ 8 Very Good</option>
                        <option value="7">⭐ 7 Good</option>
                        <option value="6">⭐ 6 Fine</option>
                        <option value="5">⭐ 5 Average</option>
                        <option value="4">⭐ 4 Bad</option>
                        <option value="3">⭐ 3 Very Bad</option>
                        <option value="2">⭐ 2 Horrible</option>
                        <option value="1">⭐ 1 Appalling</option>
                    </select>
                    <input type="url" id="m-link" placeholder="Manga Link (Optional)">
                    <select id="m-status">
                        <option>Reading</option>
                        <option>Completed</option>
                        <option>On Hold</option>
                        <option>Dropped</option>
                        <option>Plan to Read</option>
                    </select>
                    <button class="btn-primary" onclick="upsertManga()">Save to List</button>
                    <button id="btn-cancel-edit" class="btn-outline hidden" onclick="resetForm()"
                        style="width:100%; margin-top:5px">Cancel</button>
                </div>

                <div class="card">
                    <div
                        style="display:flex; justify-content:space-between; align-items:center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
                        <h3 id="list-heading" style="margin:0">My Manga List</h3>
                        <div style="display:flex; gap:5px">
                            <button id="btn-export" class="btn-outline btn-sm" onclick="exportCSV()">Export</button>
                            <select id="sort-filter" onchange="renderData()" style="margin:0; width:auto; padding:5px;">
                                <option value="newest">Newest</option>
                                <option value="rating">Rating</option>
                                <option value="az">A-Z</option>
                                <option value="za">Z-A</option>
                                <option value="ch-high">Ch: High-Low</option>
                            </select>
                            <button id="btn-delete-all" class="btn-outline btn-sm hidden" style="color: #ef4444;"
                                onclick="deleteAllManga()">Delete All</button>
                            <button id="back-btn" class="btn-outline btn-sm hidden"
                                onclick="viewingProfileId=null; renderData()">← Back</button>
                        </div>
                    </div>
                    <input type="text" id="search-bar" placeholder="🔍 Search..." oninput="renderData()">
                    <div id="manga-list-header" class="manga-row"
                        style="font-weight: bold; border-bottom: 2px solid var(--border);" class="hidden">
                        <div>Title & Progress</div>
                        <div>Chapter</div>
                        <div>Status</div>
                        <div>Rating</div>
                        <div>Link</div>
                        <div style="text-align: right;">Action</div>
                    </div>
                    <div id="content-container"></div>
                </div>
            </div>
        </div>

        <script>
            const SB_URL = 'https://dauopmsedlmpfngvvvjr.supabase.co';
            const SB_KEY = 'sb_publishable_rjDkxXKdQ3TOF-0vCeQP5g_1-zINEh8';
            const sb = supabase.createClient(SB_URL, SB_KEY);

            let currentUser = null;
            let allMangaData = [];
            let currentTab = 'my';
            let viewingProfileId = null;
            let editingId = null;
            let statusFilter = 'All';

            window.onload = async () => {
                updateClock();
                setInterval(updateClock, 1000);

                const savedTheme = localStorage.getItem('manga-theme') || 'light';
                document.body.setAttribute('data-theme', savedTheme);
                document.getElementById('theme-btn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';
                const { data: { session } } = await sb.auth.getSession();
                if (session) handleAuth(session);
                sb.auth.onAuthStateChange((_event, session) => handleAuth(session));
            };

            function updateClock() {
                const now = new Date();
                const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
                document.getElementById('live-clock').textContent = now.toLocaleString('en-US', options);
            }

            function toggleTheme() {
                const currentTheme = document.body.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', newTheme);
                localStorage.setItem('manga-theme', newTheme);
                document.getElementById('theme-btn').innerText = newTheme === 'dark' ? '☀️' : '🌙';
            }

            function handleAuth(session) {
                if (session) {
                    currentUser = session.user;
                    document.getElementById('nav-logged-in').classList.remove('hidden');
                    document.getElementById('nav-logged-out').classList.add('hidden');
                    document.getElementById('user-display').textContent = 'User_' + currentUser.id.substring(0, 4);
                    showView('dashboard');
                    fetchData();
                } else {
                    currentUser = null;
                    showView('login');
                    document.getElementById('nav-logged-in').classList.add('hidden');
                    document.getElementById('nav-logged-out').classList.remove('hidden');
                }
            }

            async function fetchData() {
                const { data } = await sb.from('manga').select('*');
                allMangaData = data || [];
                renderData();
            }

            async function upsertManga() {
                const title = document.getElementById('m-title').value.trim();
                const chapter = parseFloat(document.getElementById('m-chapter').value) || 0;
                const total = parseInt(document.getElementById('m-total').value) || 0;
                const rating = parseInt(document.getElementById('m-rating').value) || 0;
                const status = document.getElementById('m-status').value;
                const link = document.getElementById('m-link').value.trim();
                if (!title) return alert("Title is required!");
                const payload = {
                    user_id: currentUser.id, title, chapter,
                    total_chapters: total, rating: rating, status, link,
                    updated_at: new Date().toISOString()
                };
                const { error } = editingId ? await sb.from('manga').update(payload).eq('id', editingId) : await sb.from('manga').insert([payload]);
                if (error) alert(error.message); else { resetForm(); fetchData(); }
            }

            function exportCSV() {
                const myData = allMangaData.filter(m => m.user_id === currentUser.id);
                if (myData.length === 0) return alert("No data to export!");
                let csv = "Title,Chapter,Total,Rating,Status,Link\n";
                myData.forEach(m => { csv += `"${m.title}",${m.chapter},${m.total_chapters || 0},${m.rating},"${m.status}","${m.link || ''}"\n`; });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = "manga_list.csv"; a.click();
            }

            function timeAgo(date) {
                const seconds = Math.floor((new Date() - new Date(date)) / 1000);
                let interval = seconds / 2592000;
                if (interval > 1) return Math.floor(interval) + "mo ago";
                interval = seconds / 86400;
                if (interval > 1) return Math.floor(interval) + "d ago";
                interval = seconds / 3600;
                if (interval > 1) return Math.floor(interval) + "h ago";
                interval = seconds / 60;
                if (interval > 1) return Math.floor(interval) + "m ago";
                return "Just now";
            }

            function renderMangaList(userId, search, sort) {
                const container = document.getElementById('content-container');
                let list = allMangaData.filter(m => m.user_id === userId && m.title.toLowerCase().includes(search) && (statusFilter === 'All' || m.status === statusFilter));
                if (sort === 'az') list.sort((a, b) => a.title.localeCompare(b.title));
                else if (sort === 'za') list.sort((a, b) => b.title.localeCompare(a.title));
                else if (sort === 'ch-high') list.sort((a, b) => b.chapter - a.chapter);
                else if (sort === 'rating') list.sort((a, b) => b.rating - a.rating);
                else list.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                if (list.length === 0) { container.innerHTML = "<div style='padding:20px; text-align:center;'>Empty</div>"; return; }
                list.forEach(m => {
                    const isOwner = currentUser && m.user_id === currentUser.id;
                    const row = document.createElement('div');
                    row.className = "manga-row";
                    let progHTML = '';
                    if (m.total_chapters > 0) {
                        const pct = Math.min((m.chapter / m.total_chapters) * 100, 100);
                        progHTML = `<div style="width:100%; background:var(--border); height:4px; border-radius:5px; margin-top:4px; overflow:hidden;"><div style="width:${pct}%; background:var(--primary); height:100%;"></div></div>`;
                    }
                    row.innerHTML = `
                        <div>
                            <strong style="display:block;">${m.title}</strong>
                            <small style="font-size:0.6rem; color:gray;">Updated: ${timeAgo(m.updated_at)}</small>
                            ${progHTML}
                        </div>
                        <div>${m.chapter}${m.total_chapters ? '/' + m.total_chapters : ''}</div>
                        <div><span class="status-pill" style="background:${getStatusColor(m.status)}; color:#000;">${m.status}</span></div>
                        <div>⭐ ${m.rating || 0}</div>
                        <div>${isOwner && m.link ? `<a href="${m.link}" target="_blank">🔗</a>` : (!isOwner ? '🔒' : '--')}</div>
                        <div class="act-c" style="display:flex; gap:5px; justify-content: flex-end;"></div>
                    `;
                    const actC = row.querySelector('.act-c');
                    if (isOwner) {
                        const eb = document.createElement('button'); eb.innerHTML = "✏️"; eb.className = "btn-outline btn-sm"; eb.onclick = () => editManga(m);
                        const db = document.createElement('button'); db.innerHTML = "🗑️"; db.className = "btn-outline btn-sm"; db.style.color = "#ef4444"; db.onclick = () => deleteManga(m.id);
                        actC.appendChild(eb); actC.appendChild(db);
                    } else { actC.innerHTML = "🔒"; }
                    container.appendChild(row);
                });
            }

            function editManga(m) {
                editingId = m.id;
                document.getElementById('m-title').value = m.title;
                document.getElementById('m-chapter').value = m.chapter;
                document.getElementById('m-total').value = m.total_chapters || "";
                document.getElementById('m-rating').value = m.rating || 0;
                document.getElementById('m-status').value = m.status;
                document.getElementById('m-link').value = m.link || "";
                document.getElementById('form-title').textContent = "Edit Manga";
                document.getElementById('btn-cancel-edit').classList.remove('hidden');
                window.scrollTo(0, 0);
            }

            function resetForm() {
                editingId = null;
                document.getElementById('m-title').value = "";
                document.getElementById('m-chapter').value = ""; document.getElementById('m-total').value = "";
                document.getElementById('m-rating').value = 0; document.getElementById('m-link').value = "";
                document.getElementById('form-title').textContent = "Add New Manga";
                document.getElementById('btn-cancel-edit').classList.add('hidden');
            }

            function setStatusFilter(s) { statusFilter = s; renderData(); }
            function renderData() { const container = document.getElementById('content-container'); const search = document.getElementById('search-bar').value.toLowerCase(); const backBtn = document.getElementById('back-btn'); const delAllBtn = document.getElementById('btn-delete-all'); const header = document.getElementById('manga-list-header'); const sortVal = document.getElementById('sort-filter').value; updateStats(); container.innerHTML = ""; if (currentTab === 'my') { document.getElementById('list-heading').textContent = "My Manga List"; backBtn.classList.add('hidden'); delAllBtn.classList.remove('hidden'); header.classList.remove('hidden'); renderMangaList(currentUser.id, search, sortVal); } else { if (viewingProfileId) { document.getElementById('list-heading').textContent = "User_" + viewingProfileId.substring(0, 4) + "'s List"; backBtn.classList.remove('hidden'); delAllBtn.classList.add('hidden'); header.classList.remove('hidden'); renderMangaList(viewingProfileId, search, sortVal); } else { document.getElementById('list-heading').textContent = "Community Users"; backBtn.classList.add('hidden'); delAllBtn.classList.add('hidden'); header.classList.add('hidden'); renderUserList(search); } } }
            function renderUserList(search) { const container = document.getElementById('content-container'); const usersMap = new Map(); allMangaData.forEach(m => { if (!usersMap.has(m.user_id)) { usersMap.set(m.user_id, { id: m.user_id, username: "User_" + m.user_id.substring(0, 4), count: allMangaData.filter(x => x.user_id === m.user_id).length }); } }); Array.from(usersMap.values()).filter(u => u.username.toLowerCase().includes(search)).forEach(u => { const div = document.createElement('div'); div.className = "user-card"; div.innerHTML = `<div><strong>${u.username}</strong><br><small>${u.count} entries</small></div><button class="btn-outline btn-sm">View</button>`; div.onclick = () => { viewingProfileId = u.id; statusFilter = 'All'; renderData(); }; container.appendChild(div); }); }
            function updateStats() { const statsDiv = document.getElementById('stats-container'); if (currentTab === 'community' && !viewingProfileId) { statsDiv.classList.add('hidden'); return; } statsDiv.classList.remove('hidden'); const targetId = viewingProfileId || currentUser.id; const targetManga = allMangaData.filter(m => m.user_id === targetId); const statuses = ["All", "Reading", "Completed", "On Hold", "Dropped", "Plan to Read"]; statsDiv.innerHTML = statuses.map(s => { const count = s === "All" ? targetManga.length : targetManga.filter(m => m.status === s).length; const activeClass = statusFilter === s ? 'active' : ''; return `<div class="stat-box ${activeClass}" onclick="setStatusFilter('${s}')"><div style="font-size:1.2rem; font-weight:bold; color:var(--primary)">${count}</div><small>${s}</small></div>`; }).join(''); }
            function getStatusColor(s) { if (s === 'Completed') return '#dcfce7'; if (s === 'Reading') return '#e0e7ff'; if (s === 'On Hold') return '#fef9c3'; return '#fee2e2'; }
            function switchTab(tab) { currentTab = tab; viewingProfileId = null; statusFilter = 'All'; document.getElementById('tab-my').classList.toggle('active', tab === 'my'); document.getElementById('tab-community').classList.toggle('active', tab === 'community'); document.getElementById('tracker-form-card').classList.toggle('hidden', tab === 'community'); renderData(); }
            async function deleteManga(id) { if (!confirm("Delete this?")) return; await sb.from('manga').delete().eq('id', id); fetchData(); }
            async function deleteAllManga() { if (!confirm("Delete ALL?")) return; await sb.from('manga').delete().eq('user_id', currentUser.id); fetchData(); }
            function showView(v) { ['login', 'signup', 'dashboard'].forEach(id => document.getElementById('view-' + id).classList.add('hidden')); document.getElementById('view-' + v).classList.remove('hidden'); }
            async function handleLogin() { const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value }); if (error) alert(error.message); }
            async function handleSignup() { const { error } = await sb.auth.signUp({ email: document.getElementById('signup-email').value, password: document.getElementById('signup-password').value }); if (error) alert(error.message); else alert("Verify email!"); }
            async function handleLogout() { await sb.auth.signOut(); location.reload(); }
            function togglePassword(inputId, btn) { const input = document.getElementById(inputId); if (input.type === "password") { input.type = "text"; btn.textContent = "🔒"; } else { input.type = "password"; btn.textContent = "👁️"; } }
            document.onkeydown = function (e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) || (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) || (e.ctrlKey && e.shiftKey && e.keyCode == 'U'.charCodeAt(0))) return false; };
        </script>
</body>

</html>
