<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        /* --- DARK MODE DEFINITION --- */
        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            /* Smooth transition */
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }

        .card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .hidden {
            display: none !important;
        }

        .manga-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .status-pill {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 99px;
            font-weight: bold;
        }

        .view-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: var(--border);
            /* Changed to use variable */
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: var(--text);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .user-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <div class="container">
        <nav>
            <div class="logo" onclick="location.reload()">☁️ Manga Tracker</div>
            <div id="nav-links" style="display: flex; align-items: center; gap: 10px;">
                <!-- THEME TOGGLE BUTTON -->
                <button class="btn-outline btn-sm" onclick="toggleTheme()" id="theme-btn">🌙</button>

                <div id="nav-logged-out">
                    <button class="btn-outline" onclick="showView('login')">Login</button>
                    <button class="btn-primary" onclick="showView('signup')">Sign Up</button>
                </div>
                <div id="nav-logged-in" class="hidden">
                    <span id="user-display" style="margin-right:10px; font-weight:600"></span>
                    <button class="btn-outline btn-sm" onclick="handleLogout()">Logout</button>
                </div>
            </div>
        </nav>

        <!-- AUTH VIEWS -->
        <div id="view-login" class="card" style="max-width: 400px; margin: 0 auto;">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button class="btn-primary" onclick="handleLogin()">Login</button>
        </div>

        <div id="view-signup" class="card hidden" style="max-width: 400px; margin: 0 auto;">
            <h2>Create Account</h2>
            <input type="email" id="signup-email" placeholder="Email">
            <input type="password" id="signup-password" placeholder="Password">
            <button class="btn-primary" onclick="handleSignup()">Sign Up</button>
        </div>

        <!-- DASHBOARD VIEW -->
        <div id="view-dashboard" class="hidden">
            <div class="view-tabs">
                <div id="tab-my" class="tab-btn active" onclick="switchTab('my')">My Manga List</div>
                <div id="tab-community" class="tab-btn" onclick="switchTab('community')">Community</div>
            </div>

            <!-- STATUS COUNTERS -->
            <div id="stats-container" class="card"
                style="display: flex; justify-content: space-around; flex-wrap: wrap; text-align: center; gap: 10px; margin-bottom: 20px;">
                <!-- Filled dynamically -->
            </div>

            <div class="dashboard-layout">
                <div id="tracker-form-card" class="card">
                    <h3 id="form-title">Add New Manga</h3>
                    <input type="text" id="m-title" placeholder="Manga Title">
                    <input type="number" id="m-chapter" step="0.1" placeholder="Chapter">
                    <input type="url" id="m-link" placeholder="Manga Link (Optional)">
                    <select id="m-status">
                        <option>Reading</option>
                        <option>Completed</option>
                        <option>On Hold</option>
                        <option>Dropped</option>
                        <option>Plan to Read</option>
                    </select>
                    <button class="btn-primary" onclick="upsertManga()">Save to List</button>
                    <button id="btn-cancel-edit" class="btn-outline hidden" onclick="resetForm()"
                        style="width:100%; margin-top:5px">Cancel</button>
                </div>

                <div class="card">
                    <div
                        style="display:flex; justify-content:space-between; align-items:center; gap: 10px; margin-bottom: 10px;">
                        <h3 id="list-heading" style="margin:0">My Manga List</h3>
                        <div style="display:flex; gap:5px">
                            <select id="sort-filter" onchange="renderData()" style="margin:0; width:auto; padding:5px;">
                                <option value="az">Title A-Z</option>
                                <option value="za">Title Z-A</option>
                                <option value="newest">Newest</option>
                                <option value="ch-low">Chapter: Low-High</option>
                                <option value="ch-high">Chapter: High-Low</option>
                            </select>
                            <button id="btn-delete-all" class="btn-outline btn-sm hidden"
                                style="color: #ef4444; border-color: #fecaca;" onclick="deleteAllManga()">Delete
                                All</button>
                            <button id="back-btn" class="btn-outline btn-sm hidden"
                                onclick="viewingProfileId=null; renderData()">← Back</button>
                        </div>
                    </div>
                    <input type="text" id="search-bar" placeholder="🔍 Search..." oninput="renderData()">
                    <div id="manga-list-header" class="manga-row"
                        style="font-weight: bold; border-bottom: 2px solid var(--border);" class="hidden">
                        <div>Title</div>
                        <div>Chapter</div>
                        <div>Status</div>
                        <div>Link</div>
                        <div style="text-align: right;">Action</div>
                    </div>
                    <div id="content-container"></div>
                </div>
            </div>
        </div>


        <script>
            // 1. DATABASE CONFIG
            const SB_URL = 'https://dauopmsedlmpfngvvvjr.supabase.co';
            const SB_KEY = 'sb_publishable_rjDkxXKdQ3TOF-0vCeQP5g_1-zINEh8';
            const sb = supabase.createClient(SB_URL, SB_KEY);

            let currentUser = null;
            let allMangaData = [];
            let currentTab = 'my';
            let viewingProfileId = null;
            let editingId = null;

            window.onload = async () => {
                // Apply theme on load
                const savedTheme = localStorage.getItem('manga-theme') || 'light';
                document.body.setAttribute('data-theme', savedTheme);
                document.getElementById('theme-btn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';

                const { data: { session } } = await sb.auth.getSession();
                if (session) handleAuth(session);
                sb.auth.onAuthStateChange((_event, session) => handleAuth(session));
            };

            // THEME TOGGLE LOGIC
            function toggleTheme() {
                const currentTheme = document.body.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', newTheme);
                localStorage.setItem('manga-theme', newTheme);
                document.getElementById('theme-btn').innerText = newTheme === 'dark' ? '☀️' : '🌙';
            }

            function handleAuth(session) {
                if (session) {
                    currentUser = session.user;
                    document.getElementById('nav-logged-in').classList.remove('hidden');
                    document.getElementById('nav-logged-out').classList.add('hidden');
                    const shortId = currentUser.id.substring(0, 4);
                    document.getElementById('user-display').textContent = 'User_' + shortId;
                    showView('dashboard');
                    fetchData();
                } else {
                    currentUser = null;
                    showView('login');
                    document.getElementById('nav-logged-in').classList.add('hidden');
                    document.getElementById('nav-logged-out').classList.remove('hidden');
                }
            }

            async function upsertManga() {
                const title = document.getElementById('m-title').value.trim();
                const chapter = parseFloat(document.getElementById('m-chapter').value) || 0;
                const status = document.getElementById('m-status').value;
                const link = document.getElementById('m-link').value.trim();
                if (!title) return alert("Title is required!");
                const isDuplicate = allMangaData.some(m => m.user_id === currentUser.id && m.title.toLowerCase() === title.toLowerCase() && m.id !== editingId);
                if (isDuplicate) return alert("Error: Already in list!");
                const payload = { user_id: currentUser.id, title, chapter, status, link, updated_at: new Date().toISOString() };
                const { error } = editingId ? await sb.from('manga').update(payload).eq('id', editingId) : await sb.from('manga').insert([payload]);
                if (error) alert(error.message); else { resetForm(); fetchData(); }
            }

            async function deleteManga(id) {
                if (!confirm("Delete this?")) return;
                await sb.from('manga').delete().eq('id', id);
                fetchData();
            }

            async function deleteAllManga() {
                if (!confirm("Delete ALL?")) return;
                await sb.from('manga').delete().eq('user_id', currentUser.id);
                fetchData();
            }

            async function fetchData() {
                const { data } = await sb.from('manga').select('*');
                allMangaData = data || [];
                renderData();
            }

            function renderData() {
                const container = document.getElementById('content-container');
                const search = document.getElementById('search-bar').value.toLowerCase();
                const backBtn = document.getElementById('back-btn');
                const delAllBtn = document.getElementById('btn-delete-all');
                const header = document.getElementById('manga-list-header');
                const sortVal = document.getElementById('sort-filter').value;
                updateStats();
                container.innerHTML = "";
                if (currentTab === 'my') {
                    document.getElementById('list-heading').textContent = "My Manga List";
                    backBtn.classList.add('hidden');
                    delAllBtn.classList.remove('hidden');
                    header.classList.remove('hidden');
                    renderMangaList(currentUser.id, search, sortVal);
                } else {
                    if (viewingProfileId) {
                        document.getElementById('list-heading').textContent = "User_" + viewingProfileId.substring(0, 4) + "'s List";
                        backBtn.classList.remove('hidden');
                        delAllBtn.classList.add('hidden');
                        header.classList.remove('hidden');
                        renderMangaList(viewingProfileId, search, sortVal);
                    } else {
                        document.getElementById('list-heading').textContent = "Community Users";
                        backBtn.classList.add('hidden'); delAllBtn.classList.add('hidden'); header.classList.add('hidden');
                        renderUserList(search);
                    }
                }
            }

            function renderUserList(search) {
                const container = document.getElementById('content-container');
                const usersMap = new Map();
                allMangaData.forEach(m => {
                    if (!usersMap.has(m.user_id)) {
                        usersMap.set(m.user_id, { id: m.user_id, username: "User_" + m.user_id.substring(0, 4), count: allMangaData.filter(x => x.user_id === m.user_id).length });
                    }
                });
                const users = Array.from(usersMap.values()).filter(u => u.username.toLowerCase().includes(search));
                users.forEach(u => {
                    const div = document.createElement('div');
                    div.className = "user-card";
                    div.innerHTML = `<div><strong>${u.username}</strong><br><small>${u.count} entries</small></div><button class="btn-outline btn-sm">View</button>`;
                    div.onclick = () => { viewingProfileId = u.id; renderData(); };
                    container.appendChild(div);
                });
            }

            function renderMangaList(userId, search, sort) {
                const container = document.getElementById('content-container');
                let list = allMangaData.filter(m => m.user_id === userId && m.title.toLowerCase().includes(search));
                if (sort === 'az') list.sort((a, b) => a.title.localeCompare(b.title));
                else if (sort === 'za') list.sort((a, b) => b.title.localeCompare(a.title));
                else if (sort === 'ch-low') list.sort((a, b) => a.chapter - b.chapter);
                else if (sort === 'ch-high') list.sort((a, b) => b.chapter - a.chapter);
                else list.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

                if (list.length === 0) { container.innerHTML = "<div style='padding:20px; text-align:center;'>Empty</div>"; return; }
                list.forEach(m => {
                    const isOwner = currentUser && m.user_id === currentUser.id;
                    const row = document.createElement('div');
                    row.className = "manga-row";
                    row.innerHTML = `<div><strong>${m.title}</strong></div><div>Ch. ${m.chapter}</div><div><span class="status-pill" style="background:${getStatusColor(m.status)}; color:#000;">${m.status}</span></div><div class="link-c"></div><div class="act-c" style="display:flex; gap:5px; justify-content: flex-end;"></div>`;
                    const linkC = row.querySelector('.link-c');
                    if (isOwner) {
                        linkC.innerHTML = m.link ? `<a href="${m.link}" target="_blank">🔗</a>` : `None`;
                        const actC = row.querySelector('.act-c');
                        const eb = document.createElement('button'); eb.innerHTML = "✏️"; eb.className = "btn-outline btn-sm"; eb.onclick = () => editManga(m);
                        const db = document.createElement('button'); db.innerHTML = "🗑️"; db.className = "btn-outline btn-sm"; db.style.color = "#ef4444"; db.onclick = () => deleteManga(m.id);
                        actC.appendChild(eb); actC.appendChild(db);
                    } else { linkC.innerHTML = "🔒 Private"; }
                    container.appendChild(row);
                });
            }

            function getStatusColor(s) {
                if (s === 'Completed') return '#dcfce7';
                if (s === 'Reading') return '#e0e7ff';
                if (s === 'On Hold') return '#fef9c3';
                return '#fee2e2';
            }

            function updateStats() {
                const statsDiv = document.getElementById('stats-container');
                if (currentTab === 'community' && !viewingProfileId) { statsDiv.classList.add('hidden'); return; }
                statsDiv.classList.remove('hidden');
                const targetId = viewingProfileId || currentUser.id;
                const myManga = allMangaData.filter(m => m.user_id === targetId);
                const statuses = ["Reading", "Completed", "On Hold", "Dropped", "Plan to Read"];
                statsDiv.innerHTML = statuses.map(s => {
                    const count = myManga.filter(m => m.status === s).length;
                    return `<div><div style="font-size:1.2rem; font-weight:bold; color:var(--primary)">${count}</div><small>${s}</small></div>`;
                }).join('');
            }

            function switchTab(tab) {
                currentTab = tab; viewingProfileId = null;
                document.getElementById('tab-my').classList.toggle('active', tab === 'my');
                document.getElementById('tab-community').classList.toggle('active', tab === 'community');
                document.getElementById('tracker-form-card').classList.toggle('hidden', tab === 'community');
                renderData();
            }

            function editManga(m) { editingId = m.id; document.getElementById('m-title').value = m.title; document.getElementById('m-chapter').value = m.chapter; document.getElementById('m-status').value = m.status; document.getElementById('m-link').value = m.link || ""; document.getElementById('form-title').textContent = "Edit Manga"; document.getElementById('btn-cancel-edit').classList.remove('hidden'); window.scrollTo(0, 0); }
            function resetForm() { editingId = null; document.getElementById('m-title').value = ""; document.getElementById('m-chapter').value = ""; document.getElementById('m-link').value = ""; document.getElementById('form-title').textContent = "Add New Manga"; document.getElementById('btn-cancel-edit').classList.add('hidden'); }
            function showView(v) { ['login', 'signup', 'dashboard'].forEach(id => document.getElementById('view-' + id).classList.add('hidden')); document.getElementById('view-' + v).classList.remove('hidden'); }
            async function handleLogin() { const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value }); if (error) alert(error.message); }
            async function handleSignup() { const { error } = await sb.auth.signUp({ email: document.getElementById('signup-email').value, password: document.getElementById('signup-password').value }); if (error) alert(error.message); else alert("Verify email!"); }
            async function handleLogout() { await sb.auth.signOut(); location.reload(); }

            document.onkeydown = function (e) {
                    // Block F12
                    if (e.keyCode == 123) {
                        return false;
                    }
                    // Block Ctrl+Shift+I (Inspect)
                    if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
                        return false;
                    }
                    // Block Ctrl+Shift+J (Console)
                    if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
                        return false;
                    }
                    // Block Ctrl+U (View Source)
                    if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
                        return false;
                    }
                };
        </script>
</body>

</html>
